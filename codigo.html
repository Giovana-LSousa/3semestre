<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Import Cell - Celulares Importados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), 
                        url('https://picsum.photos/id/1015/2000/1200') center/cover no-repeat;
        }
        .course-card {
            transition: all 0.3s ease;
        }
        .course-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
        .color-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 0 0 3px #e5e7eb;
        }
        .color-circle.selected {
            border: 3px solid #00bfff;
            box-shadow: 0 0 0 5px #bae6fd;
        }
        .storage-btn.active {
            background-color: #00bfff;
            color: white;
            border-color: #00bfff;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- ==================== NAVBAR ==================== -->
    <nav class="bg-white border-b shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-x-3">
                    <div class="w-10 h-10 rounded-3xl bg-gradient-to-br from-[#00bfff] to-[#ff69b4] flex items-center justify-center text-3xl shadow-inner">📱</div>
                    <h1 class="text-3xl sm:text-4xl font-bold tracking-tighter bg-gradient-to-r from-[#00bfff] to-[#ff69b4] bg-clip-text text-transparent">Import Cell</h1>
                </div>

                <div class="flex items-center gap-6">
                    <button onclick="toggleAuthModal()" class="flex items-center gap-2 text-lg hover:text-[#00bfff] transition">
                        <span id="user-name" class="font-medium hidden sm:block">Entrar</span>
                        👤
                    </button>

                    <button onclick="toggleCart()" class="flex items-center gap-x-3 hover:scale-105 transition">
                        <div class="relative">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                            </svg>
                            <span id="cart-count-badge" class="absolute -top-2 -right-2 bg-[#ff69b4] text-white text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center">0</span>
                        </div>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero-bg text-white py-20 sm:py-28 md:py-32">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h1 class="text-4xl sm:text-5xl md:text-6xl font-bold tracking-tighter leading-tight">
                Celulares Importados<br>com o melhor preço
            </h1>
        </div>
    </div>

    <!-- Produtos -->
    <section class="max-w-7xl mx-auto px-4 sm:px-6 py-12">
        <h2 class="text-3xl sm:text-4xl font-bold text-center mb-10">Nossos Celulares</h2>
        <div id="produtos-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </section>

    <!-- ==================== MODAL ESCOLHER COR E ARMAZENAMENTO ==================== -->
    <div id="product-modal" class="hidden fixed inset-0 bg-black/70 z-[150] flex items-center justify-center">
        <div class="bg-white rounded-3xl max-w-lg w-full mx-4 overflow-hidden">
            <div class="p-6">
                <div class="flex justify-between items-start mb-4">
                    <h2 id="modal-nome" class="text-2xl font-bold"></h2>
                    <button onclick="closeProductModal()" class="text-4xl text-slate-400 hover:text-black">×</button>
                </div>
                
                <img id="modal-imagem" class="w-full h-64 object-cover rounded-2xl mb-6">

                <p id="modal-descricao" class="text-slate-600 mb-6"></p>

                <!-- Armazenamento -->
                <div class="mb-6">
                    <p class="font-semibold mb-3">Armazenamento</p>
                    <div id="storage-options" class="flex flex-wrap gap-3"></div>
                </div>

                <!-- Cores -->
                <div class="mb-8">
                    <p class="font-semibold mb-3">Cor</p>
                    <div id="color-options" class="flex gap-4"></div>
                </div>

                <div class="flex items-center justify-between mt-8">
                    <span id="modal-preco" class="text-3xl font-bold text-[#00bfff]"></span>
                    <button onclick="adicionarVarianteAoCarrinho()" 
                            class="px-10 py-4 bg-gradient-to-r from-[#00bfff] to-[#ff69b4] text-white rounded-3xl font-semibold">
                        Adicionar ao Carrinho
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== CARRINHO ==================== -->
    <div id="cart-drawer" class="hidden fixed inset-0 bg-black/70 z-[100] flex justify-end">
        <div onclick="event.stopImmediatePropagation()" class="bg-white w-full max-w-lg h-full shadow-2xl flex flex-col">
            <div class="px-6 py-5 border-b flex items-center justify-between">
                <h3 class="text-2xl font-bold">Seu Carrinho</h3>
                <button onclick="toggleCart()" class="text-4xl text-slate-400 hover:text-black">×</button>
            </div>

            <div id="cart-items" class="flex-1 overflow-auto p-6 space-y-6"></div>

            <div class="p-6 border-t space-y-6">
                <div class="space-y-3">
                    <div class="flex justify-between text-lg">
                        <span class="text-slate-600">Subtotal</span>
                        <span id="subtotal" class="font-medium">R$ 0,00</span>
                    </div>
                    <div class="flex justify-between text-lg">
                        <span class="text-slate-600">Frete</span>
                        <span class="font-medium text-green-600">R$ 10,00</span>
                    </div>
                    <div class="flex justify-between text-2xl font-bold border-t pt-3">
                        <span>Total</span>
                        <span id="cart-total" class="text-[#00bfff]">R$ 0,00</span>
                    </div>
                </div>

                <div>
                    <p class="font-semibold mb-3">Forma de Pagamento</p>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="selectPayment(this)" id="btn-pix" class="payment-btn border-2 border-[#00bfff] bg-blue-50 py-4 rounded-2xl font-semibold flex flex-col items-center gap-1">
                            <span class="text-2xl">💰</span><span>PIX</span>
                        </button>
                        <button onclick="selectPayment(this)" id="btn-cartao" class="payment-btn border-2 border-slate-200 py-4 rounded-2xl font-semibold flex flex-col items-center gap-1">
                            <span class="text-2xl">💳</span><span>Cartão</span>
                        </button>
                    </div>
                </div>

                <button onclick="finalizarCompra()" class="w-full py-7 rounded-3xl bg-gradient-to-r from-[#00bfff] to-[#ff69b4] text-white text-xl font-semibold shadow-xl">
                    Finalizar Compra
                </button>
            </div>
        </div>
    </div>

    <!-- Modais de Login e Pagamento com Cartão (mantidos) -->
    <!-- ... (mesmo código dos modais de auth e cartão do código anterior) ... -->

    <script>
        // ==================== PRODUTOS COM CORES E ARMAZENAMENTO ====================
        let produtos = [
            {
                id: 1,
                nome: "iPhone 15 Pro",
                precoBase: 6799.90,
                imagem: "https://picsum.photos/id/1015/800/600",
                descricao: "Tela Super Retina XDR • Câmera 48MP",
                cores: [
                    { nome: "Titanio Natural", cor: "#c4c4c4" },
                    { nome: "Titanio Azul", cor: "#4a8cff" },
                    { nome: "Titanio Preto", cor: "#1a1a1a" }
                ],
                armazenamento: [
                    { tamanho: "128GB", preco: 6799.90 },
                    { tamanho: "256GB", preco: 7499.90 },
                    { tamanho: "512GB", preco: 8599.90 }
                ]
            },
            {
                id: 2,
                nome: "Samsung Galaxy S24 Ultra",
                precoBase: 5899.90,
                imagem: "https://picsum.photos/id/1005/800/600",
                descricao: "Caneta S Pen • 200MP",
                cores: [
                    { nome: "Titanium Gray", cor: "#555555" },
                    { nome: "Titanium Violet", cor: "#8b5cf6" },
                    { nome: "Titanium Yellow", cor: "#eab308" }
                ],
                armazenamento: [
                    { tamanho: "256GB", preco: 5899.90 },
                    { tamanho: "512GB", preco: 6599.90 }
                ]
            },
            {
                id: 3,
                nome: "Xiaomi 14T Pro",
                precoBase: 3299.90,
                imagem: "https://picsum.photos/id/1016/800/600",
                descricao: "Câmera Leica",
                cores: [
                    { nome: "Preto", cor: "#111111" },
                    { nome: "Branco", cor: "#eeeeee" }
                ],
                armazenamento: [
                    { tamanho: "256GB", preco: 3299.90 },
                    { tamanho: "512GB", preco: 3799.90 }
                ]
            }
        ];

        let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
        let produtoSelecionado = null;
        let corSelecionada = null;
        let armazenamentoSelecionado = null;
        let paymentMethod = "pix";

        // ==================== RENDER PRODUTOS ====================
        function renderProdutos() {
            const container = document.getElementById('produtos-grid');
            let html = '';
            produtos.forEach(prod => {
                html += `
                    <div onclick="abrirModalProduto(${prod.id})" class="course-card bg-white rounded-3xl overflow-hidden shadow-sm cursor-pointer">
                        <img src="${prod.imagem}" class="w-full h-56 object-cover">
                        <div class="p-5">
                            <h3 class="font-semibold text-lg">${prod.nome}</h3>
                            <p class="text-slate-500 text-sm mt-1">${prod.descricao}</p>
                            <div class="mt-4 text-2xl font-bold text-[#00bfff]">A partir de R$ ${prod.precoBase.toFixed(2).replace('.', ',')}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ==================== MODAL DE VARIAÇÃO ====================
        function abrirModalProduto(id) {
            produtoSelecionado = produtos.find(p => p.id === id);
            if (!produtoSelecionado) return;

            document.getElementById('modal-nome').textContent = produtoSelecionado.nome;
            document.getElementById('modal-imagem').src = produtoSelecionado.imagem;
            document.getElementById('modal-descricao').textContent = produtoSelecionado.descricao;

            // Armazenamento
            let storageHTML = '';
            produtoSelecionado.armazenamento.forEach((item, i) => {
                storageHTML += `<button onclick="selecionarArmazenamento(this, ${i})" class="storage-btn px-6 py-3 border rounded-2xl">${item.tamanho}</button>`;
            });
            document.getElementById('storage-options').innerHTML = storageHTML;

            // Cores
            let colorHTML = '';
            produtoSelecionado.cores.forEach(cor => {
                colorHTML += `<div onclick="selecionarCor(this, '${cor.nome}')" class="color-circle" style="background-color: ${cor.cor};"></div>`;
            });
            document.getElementById('color-options').innerHTML = colorHTML;

            selecionarArmazenamento(document.querySelector('.storage-btn'), 0);
            selecionarCor(document.querySelector('.color-circle'), produtoSelecionado.cores[0].nome);

            document.getElementById('product-modal').classList.remove('hidden');
        }

        function selecionarArmazenamento(btn, index) {
            document.querySelectorAll('.storage-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            armazenamentoSelecionado = produtoSelecionado.armazenamento[index];
            atualizarPrecoModal();
        }

        function selecionarCor(btn, nomeCor) {
            document.querySelectorAll('.color-circle').forEach(c => c.classList.remove('selected'));
            btn.classList.add('selected');
            corSelecionada = nomeCor;
        }

        function atualizarPrecoModal() {
            document.getElementById('modal-preco').textContent = 
                `R$ ${armazenamentoSelecionado.preco.toFixed(2).replace('.', ',')}`;
        }

        function adicionarVarianteAoCarrinho() {
            if (!corSelecionada || !armazenamentoSelecionado) return alert("Escolha cor e armazenamento!");

            const item = {
                id: Date.now(),
                nome: produtoSelecionado.nome,
                preco: armazenamentoSelecionado.preco,
                imagem: produtoSelecionado.imagem,
                cor: corSelecionada,
                armazenamento: armazenamentoSelecionado.tamanho
            };

            carrinho.push(item);
            localStorage.setItem('carrinho', JSON.stringify(carrinho));
            atualizarContador();
            alert(`${produtoSelecionado.nome} (${corSelecionada} - ${armazenamentoSelecionado.tamanho}) adicionado ao carrinho!`);
            closeProductModal();
        }

        function closeProductModal() {
            document.getElementById('product-modal').classList.add('hidden');
        }

        // ==================== CARRINHO ====================
        function atualizarContador() {
            document.getElementById('cart-count-badge').textContent = carrinho.length;
        }

        function renderCarrinho() {
            const container = document.getElementById('cart-items');
            let subtotal = 0;
            let html = '';

            if (carrinho.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-400 py-20">Seu carrinho está vazio</p>`;
                document.getElementById('subtotal').textContent = 'R$ 0,00';
                document.getElementById('cart-total').textContent = 'R$ 10,00';
                return;
            }

            carrinho.forEach((item, index) => {
                subtotal += item.preco;
                html += `
                    <div class="flex gap-4 border-b pb-6">
                        <img src="${item.imagem}" class="w-20 h-20 object-cover rounded-2xl">
                        <div class="flex-1">
                            <p class="font-medium">${item.nome}</p>
                            <p class="text-sm text-slate-500">${item.cor} • ${item.armazenamento}</p>
                            <p class="font-semibold">R$ ${item.preco.toFixed(2)}</p>
                        </div>
                        <button onclick="removerDoCarrinho(${index})" class="text-red-500 text-3xl">×</button>
                    </div>
                `;
            });

            const total = subtotal + 10;
            container.innerHTML = html;
            document.getElementById('subtotal').textContent = `R$ ${subtotal.toFixed(2).replace('.', ',')}`;
            document.getElementById('cart-total').textContent = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        function removerDoCarrinho(index) {
            carrinho.splice(index, 1);
            localStorage.setItem('carrinho', JSON.stringify(carrinho));
            atualizarContador();
            renderCarrinho();
        }

        function toggleCart() {
            const drawer = document.getElementById('cart-drawer');
            if (drawer.classList.contains('hidden')) {
                renderCarrinho();
                drawer.classList.remove('hidden');
            } else drawer.classList.add('hidden');
        }

        // ==================== PAGAMENTO ====================
        function selectPayment(btn) {
            document.querySelectorAll('.payment-btn').forEach(b => b.classList.remove('border-[#00bfff]', 'bg-blue-50'));
            btn.classList.add('border-[#00bfff]', 'bg-blue-50');
            paymentMethod = btn.id === 'btn-pix' ? 'pix' : 'cartao';
        }

        function finalizarCompra() {
            if (carrinho.length === 0) return;
            if (paymentMethod === 'cartao') {
                document.getElementById('card-payment-modal').classList.remove('hidden');
            } else {
                alert("✅ Pedido realizado com sucesso via PIX!");
                fecharTudo();
            }
        }

        function fecharTudo() {
            carrinho = [];
            localStorage.setItem('carrinho', JSON.stringify(carrinho));
            atualizarContador();
            toggleCart();
        }

        // Inicialização
        window.onload = () => {
            renderProdutos();
            atualizarContador();
        };
    </script>
</body>
</html>
